name: CI - Playwright Tests
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: NEWPASS
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -pNEWPASS --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Write .env
        run: |
          echo "DATABASE_URL=mysql://root:NEWPASS@localhost:3306/urban_innovation_test" >> .env
          echo "AUTH_SECRET=test-secret" >> .env
          echo "AUTH_URL=http://localhost:3000" >> .env
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env
          echo "APP_URL=http://localhost:3000" >> .env
          echo "RESEND_API_KEY=test" >> .env
          echo "AUTH_RESEND_KEY=test" >> .env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --force-reset

      - name: Seed database
        run: npx tsx prisma/seed.ts

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: mysql://root:NEWPASS@localhost:3306/urban_innovation_test
          AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          APP_URL: http://localhost:3000
          AUTH_SECRET: test-secret
          RESEND_API_KEY: test
          AUTH_RESEND_KEY: test

      - name: Start app
        run: npm run start &

      - name: Wait for app
        run: npx wait-on http://localhost:3000

      - name: Run tests
        run: npm test